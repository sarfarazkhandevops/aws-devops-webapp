name: CI-CD ECR Deploy

on:
  push:
    branches:
      - main

jobs:
  build-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region us-east-1 | \
          docker login --username AWS --password-stdin 306719643101.dkr.ecr.us-east-1.amazonaws.com

      - name: Build Image
        run: docker build -t webapp .

      - name: Tag Image
        run: |
          docker tag webapp:latest 306719643101.dkr.ecr.us-east-1.amazonaws.com/webapp:latest

      - name: Push Image
        run: docker push 306719643101.dkr.ecr.us-east-1.amazonaws.com/webapp:latest

  deploy:
    runs-on: self-hosted
    needs: build-push

    steps:
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region us-east-1 | \
          docker login --username AWS --password-stdin 306719643101.dkr.ecr.us-east-1.amazonaws.com

      - name: Pull latest image
        run: docker pull 306719643101.dkr.ecr.us-east-1.amazonaws.com/webapp:latest

      - name: Deploy
        run: docker-compose up -d

